<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clan Wars Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body { background: #0e1117; color: #fafafa; }
        .card-dark { background: #1e2130; border: 1px solid #444; border-radius: 8px; padding: 1rem; }
        .nav-tabs .nav-link { color: #aaa; border-color: transparent; }
        .nav-tabs .nav-link:hover { color: #fff; border-color: transparent; }
        .nav-tabs .nav-link.active { color: #fff; background: #1e2130; border-color: #444 #444 #1e2130; }
        .tab-content { background: #1e2130; padding: 1.25rem; border: 1px solid #444; border-top: none; border-radius: 0 0 6px 6px; }
        .scorecard { background: #1e2130; border: 1px solid #444; border-radius: 8px; padding: 12px; text-align: center; min-width: 200px; }
        .table { color: #fafafa; }
        .table-dark { --bs-table-bg: #1e2130; --bs-table-hover-bg: #2a2d3e; }
        .form-select { background-color: #1e2130; color: #fafafa; border-color: #555; }
        .form-select:focus { background-color: #1e2130; color: #fafafa; border-color: #888; box-shadow: none; }
        .btn-filter { font-size: 0.8rem; padding: 2px 10px; border-radius: 20px; }
        .btn-filter.active { background: #4a4a8a; border-color: #7070cc; color: #fff; }
        .btn-filter:not(.active) { background: transparent; border-color: #555; color: #aaa; }
        hr { border-color: #444; }
    </style>
</head>
<body>
<div class="container-fluid p-3">
    <h2 class="mb-3">Clan Wars Stats</h2>

    <!-- Filters -->
    <div class="card-dark mb-3">
        <div id="filters" class="d-flex flex-wrap gap-4"></div>
        <div class="text-muted small mt-2" id="player-count"></div>
    </div>

    <!-- Scorecards -->
    <div id="scorecards" class="d-flex flex-wrap gap-3 mb-3"></div>
    <hr>

    <!-- Tabs -->
    <ul class="nav nav-tabs" id="mainTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-summary">Match Summary</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-leaderboard">Player Leaderboard</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-guild">Guild Comparison</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-player">Player Stats</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-raw">Raw Data</button></li>
    </ul>

    <div class="tab-content">

        <!-- Tab 1: Match Summary -->
        <div class="tab-pane fade show active" id="tab-summary">
            <h5 class="mt-1 mb-3">Totals per Guild per Match</h5>
            <div id="summary-table" class="mb-4"></div>
            <h5 class="mb-2">Damage Dealt by Guild (per Match)</h5>
            <div id="chart-damage" class="mb-4"></div>
            <h5 class="mb-2">Kill / Death Ratio by Guild (per Match)</h5>
            <div id="chart-kd"></div>
        </div>

        <!-- Tab 2: Player Leaderboard -->
        <div class="tab-pane fade" id="tab-leaderboard">
            <div class="d-flex align-items-center gap-3 mt-1 mb-3">
                <span class="text-muted small">Sort by</span>
                <select id="leaderboard-sort" class="form-select form-select-sm w-auto" onchange="renderLeaderboard()">
                    <option>Kill</option>
                    <option>Death</option>
                    <option>Damage Received</option>
                    <option selected>Damage Dealt</option>
                    <option>Heal</option>
                    <option>Activated Altar</option>
                    <option>K/D</option>
                </select>
            </div>
            <h5 class="mb-2">Top 10 Players</h5>
            <div id="chart-top10" class="mb-4"></div>
            <h5 class="mb-2">Full Leaderboard</h5>
            <div id="leaderboard-table"></div>
        </div>

        <!-- Tab 3: Guild Comparison -->
        <div class="tab-pane fade" id="tab-guild">
            <div class="d-flex flex-wrap gap-3 mt-1 mb-3">
                <div>
                    <label class="form-label text-muted small mb-1">Match</label>
                    <select id="guild-match" class="form-select form-select-sm" style="min-width:180px" onchange="renderGuildComparison()"></select>
                </div>
                <div>
                    <label class="form-label text-muted small mb-1">Stat</label>
                    <select id="guild-stat" class="form-select form-select-sm" onchange="renderGuildComparison()">
                        <option>Kill</option>
                        <option>Death</option>
                        <option>Damage Received</option>
                        <option selected>Damage Dealt</option>
                        <option>Heal</option>
                        <option>Activated Altar</option>
                    </select>
                </div>
            </div>
            <div id="guild-tables" class="row g-3 mb-4"></div>
            <div id="chart-guild"></div>
        </div>

        <!-- Tab 4: Player Stats -->
        <div class="tab-pane fade" id="tab-player">
            <div class="d-flex flex-wrap gap-4 mt-1 mb-3">
                <div>
                    <label class="form-label text-muted small mb-1">Player</label>
                    <select id="player-select" class="form-select form-select-sm" style="min-width:240px" onchange="onPlayerChange()">
                        <option value="">— Select a player —</option>
                    </select>
                </div>
                <div id="enemy-guild-filter-wrap"></div>
                <div id="player-stat-filter-wrap"></div>
            </div>
            <div id="player-stat-cards"><p class="text-muted small">Select a player to view their stats.</p></div>
        </div>

        <!-- Tab 5: Raw Data -->
        <div class="tab-pane fade" id="tab-raw">
            <div class="d-flex justify-content-end mb-2 mt-1">
                <button class="btn btn-sm btn-outline-secondary" onclick="downloadCSV()">Download as CSV</button>
            </div>
            <div id="raw-table"></div>
        </div>

    </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const NUMERIC_COLS = ['Kill', 'Death', 'Damage Received', 'Damage Dealt', 'Heal', 'Activated Altar'];
const LABEL_FONT_SIZE = 24;
const EXCLUSIVE_COLOR = '#8B5CF6';
const GUILD_COLOR_PALETTE = ['#E74C3C','#F59E0B','#10B981','#3B82F6','#EC4899','#14B8A6','#F97316','#84CC16','#06B6D4','#EF4444'];
const HOME_GUILD = 'Exclusive';
const HOME_GUILD_RENAME_DATE = '2026-03-29';
function homeGuildLabel(date) { return date >= HOME_GUILD_RENAME_DATE ? 'Blood Moon' : 'Exclusive'; }
function canonicalGuild(guild) { return guild === 'Blood Moon' ? HOME_GUILD : guild; }
let guildColors = {};
function buildGuildColors(guilds) {
    guildColors = {};
    let i = 0;
    for (const g of [...guilds].sort()) {
        guildColors[g] = g === HOME_GUILD ? EXCLUSIVE_COLOR : GUILD_COLOR_PALETTE[i++ % GUILD_COLOR_PALETTE.length];
    }
}
function guildColor(guild) { return guildColors[guild] || '#888'; }
// Returns date-appropriate display name for a guild given the rows it covers
function homeGuildTraceLabel(guild, rows) {
    if (guild !== HOME_GUILD) return guild;
    const hasPre  = rows.some(r => r.day < HOME_GUILD_RENAME_DATE);
    const hasPost = rows.some(r => r.day >= HOME_GUILD_RENAME_DATE);
    if (hasPre && hasPost) return 'Exclusive / Blood Moon';
    return hasPost ? 'Blood Moon' : 'Exclusive';
}
// Map rows for table display: replace canonical HOME_GUILD name with date-appropriate label
function displayRows(rows) {
    return rows.map(r => r.guild === HOME_GUILD ? { ...r, guild: homeGuildLabel(r.day) } : r);
}
const PLOT_BASE = {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor:  'rgba(20,22,35,0.6)',
    font:          { color: '#fafafa' },
    xaxis:         { gridcolor: '#333', linecolor: '#555' },
    yaxis:         { gridcolor: '#333', linecolor: '#555' },
    legend:        { bgcolor: 'rgba(0,0,0,0)' },
    margin:        { t: 40, b: 80, l: 60, r: 20 },
};

// ── State ────────────────────────────────────────────────────────────────────
let allRows = [];
let activeFilters = { days: new Set(), matches: new Set(), guilds: new Set() };
let filteredRows = [];
const PLAYER_STAT_OPTIONS = [...NUMERIC_COLS, 'K/D'];
let activeEnemyGuilds = new Set();
let activePlayerStats = new Set(PLAYER_STAT_OPTIONS);

// ── Boot ─────────────────────────────────────────────────────────────────────
async function init() {
    try {
        const resp = await fetch('./clan-war-data.json');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        allRows = flatten(data);

        const days    = [...new Set(allRows.map(r => r.day))].sort();
        const matches = [...new Set(allRows.map(r => r.match))].sort((a, b) => a - b);
        const guilds  = [...new Set(allRows.map(r => r.guild))].sort();

        buildGuildColors(guilds);
        activeFilters = { days: new Set(days), matches: new Set(matches), guilds: new Set(guilds) };
        buildFilters({ days, matches, guilds });
        buildPlayerStatPills();
        render();
    } catch (e) {
        document.body.innerHTML = `<div class="container mt-5"><div class="alert alert-danger">Failed to load data: ${e.message}</div></div>`;
    }
}

// Resize Plotly charts when a tab becomes visible
document.querySelectorAll('[data-bs-toggle="tab"]').forEach(btn => {
    btn.addEventListener('shown.bs.tab', () => {
        document.querySelectorAll('[id^="chart-"]').forEach(el => {
            if (el._fullLayout) Plotly.Plots.resize(el);
        });
    });
});

// ── Data helpers ─────────────────────────────────────────────────────────────
function flatten(data) {
    const rows = [];
    for (const session of data.sessions) {
        for (const m of session.matches) {
            for (const g of m.guilds) {
                for (const p of g.players) {
                    rows.push({
                        day: session.date, match: m.match, guild: canonicalGuild(g.guild.replace(/_/g, ' ')),
                        Player: p.player, Kill: p.kill, Death: p.death,
                        'Damage Received': p.damage_received, 'Damage Dealt': p.damage_dealt,
                        Heal: p.heal, 'Activated Altar': p.activated_altar,
                    });
                }
            }
        }
    }
    return rows;
}

function getFiltered() {
    return allRows.filter(r =>
        activeFilters.days.has(r.day) &&
        activeFilters.matches.has(r.match) &&
        activeFilters.guilds.has(r.guild)
    );
}

function groupSum(rows, keyFn, cols) {
    const map = new Map();
    for (const r of rows) {
        const key = keyFn(r);
        if (!map.has(key)) {
            const entry = { ...r };
            for (const c of cols) entry[c] = 0;
            map.set(key, entry);
        }
        for (const c of cols) map.get(key)[c] += r[c] || 0;
    }
    return [...map.values()];
}

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters({ days, matches, guilds }) {
    const container = document.getElementById('filters');
    container.innerHTML = '';

    // Day — multi-select dropdown
    const dayWrap = document.createElement('div');
    dayWrap.innerHTML = `<div class="text-muted small mb-1">Day</div>`;
    const daySelect = document.createElement('select');
    daySelect.id = 'filter-day';
    daySelect.multiple = true;
    daySelect.className = 'form-select form-select-sm';
    daySelect.style.minWidth = '160px';
    days.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        opt.selected = true;
        daySelect.appendChild(opt);
    });
    daySelect.addEventListener('change', () => {
        activeFilters.days = new Set([...daySelect.selectedOptions].map(o => o.value));
        refreshGuildFilter();
        render();
    });
    dayWrap.appendChild(daySelect);
    container.appendChild(dayWrap);

    // Match — pills
    buildPillFilter(container, 'Match', 'matches', matches, () => {
        refreshGuildFilter();
        render();
    });

    // Guild — pills (rebuilt dynamically)
    const guildWrap = document.createElement('div');
    guildWrap.id = 'guild-filter-wrap';
    container.appendChild(guildWrap);
    buildGuildPills(guildWrap, guilds);

}

function buildPillFilter(container, label, key, values, onChange) {
    const wrap = document.createElement('div');
    wrap.innerHTML = `<div class="text-muted small mb-1">${label}</div>`;
    const group = document.createElement('div');
    group.className = 'd-flex flex-wrap gap-1';
    for (const val of values) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-filter active';
        btn.textContent = String(val);
        btn.addEventListener('click', () => {
            if (activeFilters[key].has(val)) {
                activeFilters[key].delete(val);
                btn.classList.remove('active');
            } else {
                activeFilters[key].add(val);
                btn.classList.add('active');
            }
            onChange();
        });
        group.appendChild(btn);
    }
    wrap.appendChild(group);
    container.appendChild(wrap);
}

function buildGuildPills(wrap, guilds) {
    guilds = [...guilds].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    wrap.innerHTML = `<div class="text-muted small mb-1">Guild</div>`;
    const group = document.createElement('div');
    group.className = 'd-flex flex-wrap gap-1';
    for (const guild of guilds) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-filter' + (activeFilters.guilds.has(guild) ? ' active' : '');
        btn.textContent = guild === HOME_GUILD ? 'Blood Moon' : guild;
        btn.addEventListener('click', () => {
            if (activeFilters.guilds.has(guild)) {
                activeFilters.guilds.delete(guild);
                btn.classList.remove('active');
            } else {
                activeFilters.guilds.add(guild);
                btn.classList.add('active');
            }
            render();
        });
        group.appendChild(btn);
    }
    wrap.appendChild(group);
}

function refreshGuildFilter() {
    const available = [...new Set(
        allRows
            .filter(r => activeFilters.days.has(r.day) && activeFilters.matches.has(r.match))
            .map(r => r.guild)
    )].sort();
    activeFilters.guilds = new Set(available);
    buildGuildPills(document.getElementById('guild-filter-wrap'), available);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
    filteredRows = getFiltered();
    document.getElementById('player-count').textContent = `Players shown: ${filteredRows.length}`;
    renderScorecards();
    renderMatchSummary();
    renderLeaderboard();
    populateGuildMatchSelector();
    renderGuildComparison();
    renderPlayerStats();
    renderRawData();
}

// ── Scorecards ─────────────────────────────────────────────────────────────────
function renderScorecards() {
    const base = allRows.filter(r => activeFilters.days.has(r.day) && activeFilters.matches.has(r.match));
    const map = {};
    for (const r of base) {
        const k = `${r.day}|${r.match}`;
        if (!map[k]) map[k] = { day: r.day, match: r.match, guilds: {} };
        map[k].guilds[r.guild] = (map[k].guilds[r.guild] || 0) + r.Kill;
    }

    const container = document.getElementById('scorecards');
    container.innerHTML = '';

    Object.values(map)
        .sort((a, b) => a.day < b.day ? -1 : a.day > b.day ? 1 : a.match - b.match)
        .forEach(m => {
            const homeKills = m.guilds[HOME_GUILD] || 0;
            const enemy = Object.entries(m.guilds).find(([g]) => g !== HOME_GUILD);
            const enemyName = enemy?.[0] || 'Enemy';
            const enemyKills = enemy?.[1] || 0;
            const homeWin = homeKills > enemyKills, enemyWin = enemyKills > homeKills;
            const card = document.createElement('div');
            card.className = 'scorecard';
            card.innerHTML = `
                <div style="font-size:.75rem;color:#aaa;margin-bottom:4px">Match ${m.match} · ${m.day}</div>
                <div style="display:flex;justify-content:space-around;align-items:center">
                    <div>
                        <div style="color:#4472C4;font-weight:bold;font-size:1.1rem">${homeKills} kills</div>
                        <div style="color:#4472C4;font-size:.8rem">${homeGuildLabel(m.day)} · ${homeWin ? '🏆 W' : enemyWin ? 'L' : 'Draw'}</div>
                    </div>
                    <div style="color:#888;font-size:1.2rem">vs</div>
                    <div>
                        <div style="color:#C0392B;font-weight:bold;font-size:1.1rem">${enemyKills} kills</div>
                        <div style="color:#C0392B;font-size:.8rem">${enemyName} · ${enemyWin ? '🏆 W' : homeWin ? 'L' : 'Draw'}</div>
                    </div>
                </div>`;
            container.appendChild(card);
        });
}

// ── Match Summary ──────────────────────────────────────────────────────────────
function renderMatchSummary() {
    const summary = groupSum(filteredRows, r => `${r.day}|${r.match}|${r.guild}`, NUMERIC_COLS)
        .sort((a, b) => a.day !== b.day ? (a.day < b.day ? -1 : 1) : a.match !== b.match ? a.match - b.match : a.guild < b.guild ? -1 : 1);
    summary.forEach(s => s['K/D'] = kd(s.Kill, s.Death));

    document.getElementById('summary-table').innerHTML =
        buildTable(displayRows(summary), ['day', 'match', 'guild', ...NUMERIC_COLS, 'K/D']);

    const guilds = [...new Set(summary.map(s => s.guild))];

    // Damage Dealt
    const dmgTraces = guilds.map(g => {
        const rows = summary.filter(s => s.guild === g);
        return trace(homeGuildTraceLabel(g, rows), rows.map(s => `${s.day} · M${s.match}`), rows.map(s => s['Damage Dealt']), v => fmtSI(v), guildColor(g));
    });
    Plotly.react('chart-damage', dmgTraces, {
        ...PLOT_BASE, barmode: 'group',
        xaxis: { ...PLOT_BASE.xaxis, title: 'Match' },
        yaxis: { ...PLOT_BASE.yaxis, range: [0, Math.max(...summary.map(s => s['Damage Dealt'])) * 1.2] },
        legend: { ...PLOT_BASE.legend, title: { text: 'Guild' } },
    });

    // K/D
    const kdTraces = guilds.map(g => {
        const rows = summary.filter(s => s.guild === g);
        return trace(homeGuildTraceLabel(g, rows), rows.map(s => `${s.day} · M${s.match}`), rows.map(s => parseFloat(s['K/D'])), v => String(v), guildColor(g));
    });
    Plotly.react('chart-kd', kdTraces, {
        ...PLOT_BASE, barmode: 'group',
        xaxis: { ...PLOT_BASE.xaxis, title: 'Match' },
        yaxis: { ...PLOT_BASE.yaxis, range: [0, Math.max(...summary.map(s => parseFloat(s['K/D']))) * 1.2] },
        legend: { ...PLOT_BASE.legend, title: { text: 'Guild' } },
    });
}

// ── Player Leaderboard ─────────────────────────────────────────────────────────
function renderLeaderboard() {
    const sortCol = document.getElementById('leaderboard-sort').value;
    const board = groupSum(filteredRows, r => `${r.Player}|${r.guild}`, NUMERIC_COLS);
    board.forEach(p => p['K/D'] = kd(p.Kill, p.Death));
    board.sort((a, b) => parseFloat(b[sortCol]) - parseFloat(a[sortCol]));

    const top10 = board.slice(0, 10);
    Plotly.react('chart-top10', [{
        type: 'bar',
        x: top10.map(p => p.Player),
        y: top10.map(p => p[sortCol]),
        marker: { color: top10.map(p => guildColor(p.guild)) },
        text: top10.map(p => fmt(p[sortCol])),
        textposition: 'outside',
        textfont: { size: LABEL_FONT_SIZE },
    }], {
        ...PLOT_BASE,
        xaxis: { ...PLOT_BASE.xaxis, title: 'Player' },
        yaxis: { ...PLOT_BASE.yaxis, title: sortCol, range: [0, parseFloat(top10[0]?.[sortCol] || 1) * yPad(parseFloat(top10[0]?.[sortCol] || 1))] },
        showlegend: false,
    });

    document.getElementById('leaderboard-table').innerHTML =
        buildTable(board, ['Player', 'guild', ...NUMERIC_COLS, 'K/D'], true);
}

// ── Guild Comparison ───────────────────────────────────────────────────────────
function populateGuildMatchSelector() {
    const sel = document.getElementById('guild-match');
    const prev = sel.value;
    const labels = [...new Map(
        filteredRows.map(r => [`${r.day} · Match ${r.match}`, { day: r.day, match: r.match }])
    ).keys()].sort();

    sel.innerHTML = labels.map(l => `<option>${l}</option>`).join('');
    if (labels.includes(prev)) sel.value = prev;
}

function renderGuildComparison() {
    const label = document.getElementById('guild-match').value;
    const stat  = document.getElementById('guild-stat').value;
    if (!label) return;

    const [dayPart, matchPart] = label.split(' · Match ');
    const matchNum = parseInt(matchPart);
    const matchRows = filteredRows
        .filter(r => r.day === dayPart && r.match === matchNum)
        .map(r => ({ ...r, 'K/D': parseFloat(kd(r.Kill, r.Death)) }));

    const guilds = [...new Set(matchRows.map(r => r.guild))].sort();
    const tablesDiv = document.getElementById('guild-tables');
    tablesDiv.innerHTML = '';

    for (const guild of guilds) {
        const gRows = matchRows.filter(r => r.guild === guild).sort((a, b) => b[stat] - a[stat]);
        const color = guildColor(guild);
        const label = guild === HOME_GUILD ? homeGuildLabel(dayPart) : guild;
        const col = document.createElement('div');
        col.className = 'col-md-6';
        col.innerHTML = `<div style="font-weight:bold;color:${color};margin-bottom:.5rem">${label} — ${gRows.length} players</div>
            ${buildTable(gRows, ['Player', ...NUMERIC_COLS, 'K/D'])}`;
        tablesDiv.appendChild(col);
    }

    const sorted = [...matchRows].sort((a, b) => b[stat] - a[stat]);
    const maxVal = Math.max(...matchRows.map(r => r[stat]), 1);
    const traces = guilds.map(g => {
        const gRows = sorted.filter(r => r.guild === g);
        const label = g === HOME_GUILD ? homeGuildLabel(dayPart) : g;
        return trace(label, gRows.map(r => r.Player), gRows.map(r => r[stat]), v => fmtSI(v), guildColor(g));
    });
    Plotly.react('chart-guild', traces, {
        ...PLOT_BASE, barmode: 'group',
        xaxis: { ...PLOT_BASE.xaxis, tickangle: -45 },
        yaxis: { ...PLOT_BASE.yaxis, range: [0, maxVal * 1.2] },
    });
}

// ── Player Stats ──────────────────────────────────────────────────────────────
function buildPlayerStatPills() {
    const wrap = document.getElementById('player-stat-filter-wrap');
    wrap.innerHTML = '<div class="text-muted small mb-1">Stats</div>';
    const group = document.createElement('div');
    group.className = 'd-flex flex-wrap gap-1';
    for (const stat of PLAYER_STAT_OPTIONS) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-filter active';
        btn.textContent = stat;
        btn.addEventListener('click', () => {
            if (activePlayerStats.has(stat)) { activePlayerStats.delete(stat); btn.classList.remove('active'); }
            else { activePlayerStats.add(stat); btn.classList.add('active'); }
            renderPlayerStatCards();
        });
        group.appendChild(btn);
    }
    wrap.appendChild(group);
}

function onPlayerChange() {
    const sel = document.getElementById('player-select');
    if (!sel.value) {
        activeEnemyGuilds = new Set();
        document.getElementById('enemy-guild-filter-wrap').innerHTML = '';
        document.getElementById('player-stat-cards').innerHTML = '<p class="text-muted small">Select a player to view their stats.</p>';
        return;
    }
    const sep = sel.value.indexOf('|');
    const playerGuild = sel.value.slice(sep + 1);
    const playerRows = filteredRows.filter(r => r.Player === sel.value.slice(0, sep) && r.guild === playerGuild);
    const matchKeys = [...new Set(playerRows.map(r => `${r.day}|${r.match}`))];
    const enemyGuilds = [...new Set(matchKeys.flatMap(k => {
        const [day, mn] = k.split('|');
        return allRows
            .filter(r => r.day === day && r.match === parseInt(mn) && activeFilters.days.has(r.day) && activeFilters.matches.has(r.match) && r.guild !== playerGuild)
            .map(r => r.guild);
    }))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
    activeEnemyGuilds = new Set(enemyGuilds);
    buildEnemyGuildPills(enemyGuilds);
    renderPlayerStatCards();
}

function buildEnemyGuildPills(enemyGuilds) {
    const wrap = document.getElementById('enemy-guild-filter-wrap');
    if (!enemyGuilds.length) { wrap.innerHTML = ''; return; }
    wrap.innerHTML = '<div class="text-muted small mb-1">vs. Guild</div>';
    const group = document.createElement('div');
    group.className = 'd-flex flex-wrap gap-1';
    for (const guild of enemyGuilds) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-filter' + (activeEnemyGuilds.has(guild) ? ' active' : '');
        btn.textContent = guild;
        btn.addEventListener('click', () => {
            if (activeEnemyGuilds.has(guild)) { activeEnemyGuilds.delete(guild); btn.classList.remove('active'); }
            else { activeEnemyGuilds.add(guild); btn.classList.add('active'); }
            renderPlayerStatCards();
        });
        group.appendChild(btn);
    }
    wrap.appendChild(group);
}

function renderPlayerStats() {
    // Rebuild player dropdown, preserving selection
    const sel = document.getElementById('player-select');
    const prev = sel.value;
    const seen = new Map();
    for (const r of filteredRows) {
        const key = `${r.Player}|${r.guild}`;
        if (!seen.has(key)) {
            const gLabel = r.guild === HOME_GUILD ? 'Blood Moon' : r.guild;
            seen.set(key, `[${gLabel}] ${r.Player}`);
        }
    }
    const opts = [...seen.entries()].sort((a, b) => a[1].localeCompare(b[1]));
    sel.innerHTML = '<option value="">— Select a player —</option>' +
        opts.map(([val, label]) => `<option value="${val}">${label}</option>`).join('');
    if (opts.some(([val]) => val === prev)) { sel.value = prev; }
    else if (prev) { onPlayerChange(); return; }
    renderPlayerStatCards();
}

function renderPlayerStatCards() {
    const sel = document.getElementById('player-select');
    const container = document.getElementById('player-stat-cards');
    if (!sel.value) {
        container.innerHTML = '<p class="text-muted small">Select a player to view their stats.</p>';
        return;
    }
    const sep = sel.value.indexOf('|');
    const playerName = sel.value.slice(0, sep);
    const playerGuild = sel.value.slice(sep + 1);
    const playerRows = filteredRows.filter(r => r.Player === playerName && r.guild === playerGuild);

    const matchKeys = [...new Set(playerRows.map(r => `${r.day}|${r.match}`))].sort();
    const matchInfo = matchKeys.map(k => {
        const [day, mn] = k.split('|');
        const matchNum = parseInt(mn);
        const row = playerRows.find(r => r.day === day && r.match === matchNum);
        const enemyGuild = [...new Set(
            allRows.filter(r => r.day === day && r.match === matchNum &&
                activeFilters.days.has(r.day) && activeFilters.matches.has(r.match) && r.guild !== playerGuild)
            .map(r => r.guild)
        )].join(', ') || '?';
        return { day, match: matchNum, row, enemyGuild, label: `${day} · M${matchNum}` };
    }).filter(m => activeEnemyGuilds.has(m.enemyGuild));

    container.innerHTML = '';
    if (!matchInfo.length) {
        container.innerHTML = '<p class="text-muted small">No matches for the current selection.</p>';
        return;
    }

    for (const stat of PLAYER_STAT_OPTIONS) {
        if (!activePlayerStats.has(stat)) continue;
        const values = matchInfo.map(m =>
            stat === 'K/D' ? parseFloat(kd(m.row.Kill, m.row.Death)) : (m.row[stat] || 0));
        const labels = matchInfo.map(m => m.label);
        const chartId = `chart-player-${stat.replace(/[\s/]+/g, '-')}`;
        const tableRows = matchInfo.map(m => ({
            Date: m.day, Match: m.match, 'vs.': m.enemyGuild,
            Kill: m.row.Kill, Death: m.row.Death,
            'Damage Received': m.row['Damage Received'], 'Damage Dealt': m.row['Damage Dealt'],
            Heal: m.row.Heal, 'Activated Altar': m.row['Activated Altar'],
            'K/D': kd(m.row.Kill, m.row.Death),
        }));
        const card = document.createElement('div');
        card.className = 'card-dark mb-3';
        card.innerHTML = `<h6 class="mb-2">${stat}</h6><div id="${chartId}" class="mb-3"></div>${buildTable(tableRows, ['Date', 'Match', 'vs.', ...NUMERIC_COLS, 'K/D'])}`;
        container.appendChild(card);
        const maxVal = Math.max(...values, 1);
        Plotly.react(chartId, [{
            type: 'bar', x: labels, y: values,
            marker: { color: guildColor(playerGuild) },
            text: values.map(v => stat === 'K/D' ? String(v) : fmtSI(v)),
            textposition: 'outside', textfont: { size: 16 },
        }], {
            ...PLOT_BASE, height: 220,
            margin: { t: 10, b: 60, l: 60, r: 20 },
            xaxis: { ...PLOT_BASE.xaxis },
            yaxis: { ...PLOT_BASE.yaxis, range: [0, maxVal * yPad(maxVal)] },
            showlegend: false,
        });
    }
}

// ── Raw Data ────────────────────────────────────────────────────────────────────
function renderRawData() {
    document.getElementById('raw-table').innerHTML =
        buildTable(displayRows(filteredRows), ['day', 'match', 'guild', 'Player', ...NUMERIC_COLS]);
}

function downloadCSV() {
    const cols = ['day', 'match', 'guild', 'Player', ...NUMERIC_COLS];
    const lines = [cols.join(','), ...filteredRows.map(r => cols.map(c => JSON.stringify(r[c] ?? '')).join(','))];
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/csv' }));
    a.download = 'clan_wars_stats.csv';
    a.click();
}

// ── Shared helpers ──────────────────────────────────────────────────────────────
function trace(name, x, y, textFn, color) {
    const t = {
        type: 'bar', name, x, y,
        text: y.map(v => textFn(v)),
        textposition: 'outside',
        textfont: { size: LABEL_FONT_SIZE },
    };
    if (color) t.marker = { color };
    return t;
}

function buildTable(rows, cols, numbered = false) {
    if (!rows.length) return '<p class="text-muted small">No data.</p>';
    const th = (numbered ? '<th>#</th>' : '') + cols.map(c => `<th class="text-nowrap">${c}</th>`).join('');
    const trs = rows.map((r, i) => {
        const tds = cols.map(c => {
            const v = r[c];
            const display = (typeof v === 'number' && NUMERIC_COLS.includes(c)) ? fmt(v) : (v ?? '');
            return `<td>${display}</td>`;
        }).join('');
        return `<tr>${numbered ? `<td class="text-muted">${i + 1}</td>` : ''}${tds}</tr>`;
    }).join('');
    return `<div class="table-responsive"><table class="table table-sm table-dark table-hover mb-0 align-middle">
        <thead class="table-secondary"><tr>${th}</tr></thead><tbody>${trs}</tbody></table></div>`;
}

function yPad(maxVal) {
    if (maxVal >= 1e6) return 1.25;
    if (maxVal >= 1e4) return 1.30;
    if (maxVal >= 100) return 1.38;
    return 1.55;
}
function fmt(n)   { return Number(n).toLocaleString(); }
function kd(k, d) { return (k / (d || 1)).toFixed(2); }
function fmtSI(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
    return String(n);
}

init();
</script>
